databases:
  - name: timetable-db
    plan: free
    databaseName: timetable_db
    user: timetable_user

services:
  - type: web
    name: timetable-app
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: DATABASE_URL
        fromDatabase:
          name: timetable-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER_EXTERNAL_HOSTNAME
        sync: false
